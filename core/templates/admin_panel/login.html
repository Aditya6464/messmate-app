{% extends 'base.html' %}

{% block title %}Admin Login - Mess Manager{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-purple-500 rounded-full mb-4">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Admin Login</h1>
            <p class="text-gray-600">Mess Manager Dashboard</p>
        </div>

        <!-- Login Card -->
        <div class="card">
            <form method="post" class="space-y-6">
                {% csrf_token %}

                <!-- Error Messages -->
                {% if form.errors %}
                <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded">
                    <p class="text-sm text-red-700">Invalid username or password.</p>
                </div>
                {% endif %}

                <!-- Username -->
                <div>
                    <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-2">
                        Username
                    </label>
                    <input type="text" name="username" id="{{ form.username.id_for_label }}"
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none"
                        placeholder="Enter username" required autofocus>
                </div>

                <!-- Password -->
                <div>
                    <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <input type="password" name="password" id="{{ form.password.id_for_label }}"
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none"
                        placeholder="Enter password" required>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="w-full btn bg-purple-500 text-white hover:bg-purple-600 shadow-lg hover:shadow-xl text-lg">
                    Login →
                </button>
            </form>
        </div>

        <!-- Back to Customer -->
        <div class="mt-6 text-center">
            <a href="{% url 'customer_id_entry' %}" class="text-sm text-blue-600 hover:text-blue-700">
                ← Back to Customer Portal
            </a>
        </div>
    </div>
</div>
{% endblock %}
