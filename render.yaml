services:
  - type: web
    name: mess-manager
    env: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn mess_manager.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: mess-manager-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+14155238886
      - key: ADMIN_WHATSAPP_NUMBER
        value: +918180994839
      - key: UPI_ID
        value: adipatil6464-2@oksbi
      - key: LUNCH_PRICE
        value: 1800
      - key: DINNER_PRICE
        value: 1800
      - key: BOTH_PRICE
        value: 3600
      - key: LUNCH_START_TIME
        value: "12:00"
      - key: LUNCH_END_TIME
        value: "15:00"
      - key: DINNER_START_TIME
        value: "19:00"
      - key: DINNER_END_TIME
        value: "22:00"

databases:
  - name: mess-manager-db
    plan: free
    databaseName: mess_manager
    user: mess_manager
